# Fly.io app config for Allokit client demo.
# First deploy: see scripts/fly-init.ps1

app = "allokit-qr-gen"
primary_region = "ams"

[build]

[env]
  ALLOKIT_DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/stats"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Persistent storage requires `fly volumes create` (CLI only). For a demo
# without terminal setup, data lives in the container filesystem at /data
# and resets when the machine is replaced.

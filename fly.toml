# Fly.io app config for Allokit.
# First deploy: see scripts/fly-init.ps1

app = "allokit-qr-gen"
primary_region = "ams"

[build]

[env]
  ALLOKIT_DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/stats"
    timeout = "5s"


[[mounts]]
  source = "allokit_data"
  destination = "/data"
    

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Persistent job storage (create volume with `fly volumes create`).

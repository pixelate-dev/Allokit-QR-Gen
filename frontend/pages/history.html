<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<title>Allokit QR Generator — Jobs & History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=optional" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<script>
  try {
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const nav = performance.getEntriesByType('navigation')[0];
    const isReload = nav && nav.type === 'reload';
    if (!reducedMotion && (sessionStorage.getItem('pageTransition') === '1' || isReload)) {
      document.documentElement.classList.add('page-enter');
    }
    if (sessionStorage.getItem('searchFocus') === '1') {
      document.documentElement.classList.add('search-arrive');
    }
  } catch (_) {}
</script>
</head>

<script src="/config.js"></script>
<script src="../js/api.js"></script>

              Generate

            <a href="history.html" id="nav-history" class="active nav-page-link">

                <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/>
              </svg>
              Jobs &amp; History
            </a>
          </li>
        </ul>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">Support</span>
        <ul class="nav-list">
          <li>
            <a href="print-guide.html" id="nav-print-guide" class="nav-page-link">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">

    </div>
    <div class="topbar-actions">
      <button type="button" class="btn-icon" aria-label="Notifications">

        <span class="notification-dot"></span>

    </div>
  </header>

  <main>
    <section id="page-history">

      <div class="page-header">
        <div>
          <h1>Jobs &amp; History</h1>
          <p>A live log of every generation job.</p>
        </div>
        <div class="page-header-actions">
          <div id="queue-status" class="queue-status" hidden>
            <div id="queue-progress" class="queue-progress"></div>
            <span id="queue-eta" class="queue-eta" aria-live="polite"></span>
          </div>
          <div class="cancel-all-wrap">
            <button type="button" id="cancel-all-btn" disabled aria-haspopup="dialog" aria-expanded="false">Cancel All</button>

                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                  </svg>
                </span>

              </div>

                <button type="button" class="cancel-all-confirm-yes">Cancel all</button>

          <input type="file" id="add-csv-input" accept=".csv" multiple hidden>

      <div class="jobs-card">
        <div class="jobs-table-wrap">
          <table id="jobs-table">
            <colgroup>
              <col class="col-id">
              <col class="col-name">
              <col class="col-type">
              <col class="col-date">
              <col class="col-stickers">
              <col class="col-progress">
              <col class="col-status">
              <col class="col-download">
            </colgroup>
            <thead>
              <tr>
                <th>#</th>
                <th>Project Name</th>
                <th>Type</th>
                <th>Date</th>
                <th>Stickers</th>
                <th>Progress</th>
                <th>Status</th>
                <th>Download</th>
              </tr>
            </thead>
            <tbody id="jobs-tbody">
              <tr><td colspan="8" class="table-empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </section>
  </main>
</div>

<script src="../js/nav.js"></script>
<script src="../js/job-id-format.js"></script>
<script src="../js/search.js"></script>
<script src="../js/progress.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/csv-upload-queue.js"></script>
<script>
  const tbody = document.getElementById('jobs-tbody');
  const cancelAllWrap = document.querySelector('.cancel-all-wrap');
  const cancelAllBtn = document.getElementById('cancel-all-btn');
  const cancelAllConfirmEl = document.getElementById('cancel-all-confirm');
  const cancelAllConfirmText = cancelAllConfirmEl.querySelector('.cancel-all-confirm-text');
  const cancelAllConfirmYes = cancelAllConfirmEl.querySelector('.cancel-all-confirm-yes');
  const cancelAllConfirmNo = cancelAllConfirmEl.querySelector('.cancel-all-confirm-no');
  let cancelAllConfirmOpen = false;
  let csvQueuePending = 0;
  let cancelAllInFlight = false;
  const queueStatusEl = document.getElementById('queue-status');
  const queueProgressEl = document.getElementById('queue-progress');
  const queueEtaEl = document.getElementById('queue-eta');
  let allJobs = [];
  const pendingCancelIds = new Set();
  const cancellingJobIds = new Set();
  // Job ids included in an in-flight cancel-all; shown as cancelled until confirmed.
  const forceCancelTargets = new Set();
  let editingJobId = null;
  let secondsPerSticker = 0.5;
  const motionOk = !window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function revealPageChrome() {
    if (!motionOk) return;
    const items = [
      document.querySelector('#page-history .page-header'),
      document.querySelector('#page-history .jobs-card'),
    ].filter(Boolean);

    items.forEach((el) => el.classList.add('history-chrome-pre'));

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        items.forEach((el, i) => {
          el.classList.remove('history-chrome-pre');
          el.classList.add('history-chrome-in');
          el.style.setProperty('--chrome-i', i);
        });
      });
    });
  }

  function animateRowsIn() {
    if (!motionOk) return;
    const rowStaggerMs = 36;
    const maxStaggerRows = 14;

    Array.from(tbody.children).forEach((row, i) => {
      const delay = Math.min(i, maxStaggerRows) * rowStaggerMs;
      row.style.setProperty('--row-delay', `${delay}ms`);
      row.classList.add('jobs-row-enter');
      row.addEventListener('animationend', () => {
        row.classList.remove('jobs-row-enter');
        row.style.removeProperty('--row-delay');
      }, { once: true });
    });
  }

  function cancelledJobPatch(job) {
    return {
      ...job,
      status: 'cancelled',
      progress: 0,
      pdf_path: null,
      error: null,
    };
  }

  function reconcilePendingCancels(jobs) {
    if (pendingCancelIds.size === 0) return jobs;

    return jobs.map((job) => {
      if (!pendingCancelIds.has(job.id)) return job;

      // Server confirmed cancellation.
      if (job.status === 'cancelled') {
        pendingCancelIds.delete(job.id);
        forceCancelTargets.delete(job.id);
        return job;
      }

      // Force-cancel in progress: keep optimistic cancelled state.
      if (forceCancelTargets.has(job.id)) {
        return cancelledJobPatch(job);
      }

      // Job already terminal and not cancellable: show actual status.
      if (job.status === 'ready' || job.status === 'failed') {
        pendingCancelIds.delete(job.id);
        return job;
      }

      return cancelledJobPatch(job);
    });
  }

  function applyOptimisticCancel(jobs) {
    const ids = jobs.map((job) => job.id);
    ids.forEach((id) => {
      pendingCancelIds.add(id);
      forceCancelTargets.add(id);
    });

    allJobs = allJobs.map((job) => (
      pendingCancelIds.has(job.id) ? cancelledJobPatch(job) : job
    ));

    jobs.forEach((job) => {
      window.AllokitNotifications?.ingestJobUpdate(cancelledJobPatch(job));
    });

    renderJobs(allJobs);
    updateCancelAllBtn();
    return ids;
  }

  function canCancelJob(job) {
    return job.status === 'waiting' || job.status === 'generating';
  }

  function buildCancelAllLabel() {
    const jobCount = allJobs.filter(canCancelJob).length;
    const parts = [];
    if (jobCount === 1) parts.push('1 active job');
    else if (jobCount > 1) parts.push(`${jobCount} active jobs`);
    if (csvQueuePending === 1) parts.push('1 queued file');
    else if (csvQueuePending > 1) parts.push(`${csvQueuePending} queued files`);
    return parts.join(' and ') || 'everything';
  }

  function setCancelAllCancellingState() {
    cancelAllBtn.disabled = true;
    cancelAllBtn.classList.add('is-cancelling');
    cancelAllBtn.setAttribute('aria-busy', 'true');
    cancelAllBtn.innerHTML = '<span class="cancel-all-spinner" aria-hidden="true"></span>Cancelling…';
  }

  function updateCancelAllBtn() {
    // Preserve cancelling UI while cancel-all is in flight.
    if (cancelAllInFlight) {
      updateQueueEta();
      return;
    }

    cancelAllBtn.classList.remove('is-cancelling');
    cancelAllBtn.removeAttribute('aria-busy');

    const jobCount = allJobs.filter(canCancelJob).length;
    const total = jobCount + csvQueuePending;
    cancelAllBtn.disabled = total === 0;
    cancelAllBtn.textContent = total > 0 ? `Cancel All (${total})` : 'Cancel All';
    if (total === 0) closeCancelAllConfirm();
    updateQueueEta();
  }

  function positionCancelAllConfirm() {
    const rect = cancelAllBtn.getBoundingClientRect();
    const gap = 6;
    const width = cancelAllConfirmEl.offsetWidth;
    const height = cancelAllConfirmEl.offsetHeight;
    const top = Math.max(8, rect.top - height - gap);
    const left = Math.max(8, Math.min(rect.right - width, window.innerWidth - width - 8));
    cancelAllConfirmEl.style.top = `${top}px`;
    cancelAllConfirmEl.style.left = `${left}px`;
  }

  function openCancelAllConfirm(label) {
    cancelAllConfirmText.textContent = `Cancel ${label}?`;
    document.body.appendChild(cancelAllConfirmEl);
    cancelAllConfirmEl.hidden = false;
    positionCancelAllConfirm();
    cancelAllConfirmEl.classList.add('is-open');
    cancelAllConfirmOpen = true;
    cancelAllBtn.setAttribute('aria-expanded', 'true');
    cancelAllConfirmYes.focus();
  }

  function closeCancelAllConfirm() {
    if (!cancelAllConfirmOpen) return;
    cancelAllConfirmEl.classList.remove('is-open');
    cancelAllConfirmEl.hidden = true;
    cancelAllConfirmOpen = false;
    cancelAllBtn.setAttribute('aria-expanded', 'false');
    cancelAllConfirmEl.style.top = '';
    cancelAllConfirmEl.style.left = '';
    cancelAllWrap.appendChild(cancelAllConfirmEl);
  }

  function onCancelAllBtnClick() {
    if (cancelAllInFlight) return;

    const jobCount = allJobs.filter(canCancelJob).length;
    if (jobCount === 0 && csvQueuePending === 0) return;

    if (cancelAllConfirmOpen) {
      closeCancelAllConfirm();
      return;
    }

    openCancelAllConfirm(buildCancelAllLabel());
  }

  function isActiveBatchJob(job) {
    return job.type === 'batch' && (job.status === 'waiting' || job.status === 'generating');
  }

  function completedBatchStickers(job) {
    if (job.status === 'waiting') return 0;
    if (job.status === 'generating') {
      return Math.min(job.sticker_count, Math.floor(job.sticker_count * job.progress / 100));
    }
    return 0;
  }

  function queueBatchStats() {
    const active = allJobs.filter(isActiveBatchJob);
    const total = active.reduce((sum, job) => sum + job.sticker_count, 0);
    const completed = active.reduce((sum, job) => sum + completedBatchStickers(job), 0);
    const remaining = Math.max(0, total - completed);
    const percent = total > 0 ? Math.min(100, Math.round((completed / total) * 100)) : 0;
    const isRunning = active.some((job) => job.status === 'generating' && job.progress < 100);
    return { active, total, completed, remaining, percent, isRunning };
  }

  function formatEta(seconds) {
    const s = Math.max(1, Math.ceil(seconds));
    if (s < 60) return `~${s} sec`;
    if (s < 3600) {
      const m = Math.ceil(s / 60);
      return m === 1 ? '~1 min' : `~${m} min`;
    }
    const h = Math.floor(s / 3600);
    const m = Math.ceil((s % 3600) / 60);
    if (m === 0) return h === 1 ? '~1 hr' : `~${h} hr`;
    return `~${h} hr ${m} min`;
  }

  function updateQueueEta() {
    const { active, remaining, percent, isRunning } = queueBatchStats();
    if (active.length === 0) {
      queueStatusEl.hidden = true;
      queueEtaEl.textContent = '';
      return;
    }

    const totalSeconds = remaining * secondsPerSticker;
    queueEtaEl.textContent = remaining > 0
      ? `Est. ${formatEta(totalSeconds)} remaining`
      : 'Finishing up…';
    setProgressBar(queueProgressEl, percent, { active: isRunning });
    queueStatusEl.hidden = false;
  }

  AllokitSearch.bind(() => renderJobs(allJobs));

  function applyJobGroupFocus(jobIds, query) {
    const ids = [...jobIds].map(Number).filter((id) => Number.isFinite(id));
    if (ids.length === 0) return;

    const label = query || AllokitSearch.formatJobIdSetLabel(ids);
    AllokitSearch.applySearchState(label, ids);
    renderJobs(allJobs);
    highlightJobRows(ids);
  }

  function highlightJobRows(jobIds) {
    const ids = [...jobIds].map(String);
    ids.forEach((id) => {
      tbody.querySelector(`tr[data-job-id="${id}"]`)?.classList.add('jobs-row-highlight');
    });

    const firstRow = tbody.querySelector(`tr[data-job-id="${ids[0]}"]`);
    if (firstRow) {
      firstRow.scrollIntoView({ behavior: motionOk ? 'smooth' : 'auto', block: 'center' });
    }

    window.setTimeout(() => {
      ids.forEach((id) => {
        tbody.querySelector(`tr[data-job-id="${id}"]`)?.classList.remove('jobs-row-highlight');
      });
    }, 2500);
  }

  window.addEventListener('allokit:focus-jobs', (e) => {
    const jobIds = e.detail?.jobIds;
    const query = e.detail?.query;
    if (!Array.isArray(jobIds) || jobIds.length === 0) return;
    applyJobGroupFocus(jobIds, query);
  });

  window.addEventListener('allokit:focus-job', (e) => {
    const jobId = e.detail?.jobId;
    if (!jobId) return;
    applyJobGroupFocus([Number(jobId)], String(jobId));
  });

  async function loadJobs() {
    try {
      const [jobsRes, statsRes] = await Promise.all([
        fetch(`${API_BASE}/jobs`),
        fetch(`${API_BASE}/stats`),
      ]);
      if (!jobsRes.ok) throw new Error(jobsRes.status);
      allJobs = reconcilePendingCancels(await jobsRes.json());
      window.AllokitNotifications?.ingestJobs(allJobs);
      if (statsRes.ok) {
        const stats = await statsRes.json();
        secondsPerSticker = stats.seconds_per_sticker ?? 0.5;
      }
      renderJobs(allJobs);
      updateCancelAllBtn();
    } catch (err) {
      console.error('Failed to load jobs:', err);
      tbody.innerHTML = '<tr><td colspan="8" class="table-empty">Failed to load jobs.</td></tr>';
    }
  }

  function focusNotificationJob() {
    let jobIds = [];
    try {
      const groupRaw = sessionStorage.getItem(window.AllokitNotifications?.focusJobsKey || 'notificationJobIds');
      if (groupRaw) {
        jobIds = JSON.parse(groupRaw).map(Number).filter((id) => Number.isFinite(id));
        sessionStorage.removeItem(window.AllokitNotifications?.focusJobsKey || 'notificationJobIds');
      } else {
        const jobId = sessionStorage.getItem(window.AllokitNotifications?.focusJobKey || 'notificationJobId');
        if (jobId) {
          jobIds = [Number(jobId)];
          sessionStorage.removeItem(window.AllokitNotifications?.focusJobKey || 'notificationJobId');
        }
      }
    } catch (_) {}

    if (jobIds.length === 0) return;
    highlightJobRows(jobIds);
  }

  function renderJobs(jobs) {
    const filtered = AllokitSearch.filterJobs(jobs);

    if (jobs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="table-empty">No jobs yet. Head to Generate to create your first sticker.</td></tr>';
      animateRowsIn();
      updateCancelAllBtn();
      focusNotificationJob();
      return;
    }

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="table-empty table-empty-filtered">No jobs match your search.</td></tr>';
      animateRowsIn();
      updateCancelAllBtn();
      focusNotificationJob();
      return;
    }

    const existingRows = {};
    Array.from(tbody.children).forEach((tr) => {
      if (tr.dataset.jobId) existingRows[tr.dataset.jobId] = tr;
    });

    const desiredIds = filtered.map((j) => String(j.id));
    const currentIds = Array.from(tbody.children)
      .filter((tr) => tr.dataset.jobId)
      .map((tr) => tr.dataset.jobId);

    if (desiredIds.join(',') === currentIds.join(',') && desiredIds.length > 0) {
      filtered.forEach((job) => {
        const key = String(job.id);
        if (key === String(editingJobId)) return;
        updateRow(existingRows[key], job);
      });
      updateCancelAllBtn();
      focusNotificationJob();
      return;
    }

    tbody.innerHTML = '';
    filtered.forEach((job) => {
      const key = String(job.id);
      if (key === String(editingJobId) && existingRows[key]) {
        tbody.appendChild(existingRows[key]);
      } else {
        tbody.appendChild(renderRow(job));
      }
    });
    animateRowsIn();
    updateCancelAllBtn();
    focusNotificationJob();
  }

  function progressOptions(job) {
    if (job.status === 'ready') {
      return { value: 100, active: false, cancelled: false };
    }
    if (job.status === 'cancelled') {
      return { value: 0, active: false, cancelled: true };
    }
    return { value: job.progress, active: job.status === 'generating', cancelled: false };
  }

  function updateRow(tr, job) {
    if (!tr) return;

    const progressOpts = progressOptions(job);

    tr.children[0].textContent = job.id;

    const nameSpan = tr.querySelector('.name-cell span');
    if (nameSpan && !nameSpan.closest('.name-cell')?.querySelector('input')) {
      nameSpan.textContent = job.name;
      nameSpan.title = job.name;
    }

    const typeBadge = tr.children[2].querySelector('.type-badge');
    if (typeBadge) {
      typeBadge.className = 'type-badge' + (job.type === 'batch' ? ' type-badge--batch' : '');
      typeBadge.textContent = job.type === 'batch' ? 'Batch' : 'Single';
    }

    tr.children[3].textContent = formatDate(job.created_at);
    tr.children[4].textContent = formatNum(job.sticker_count);

    const progressEl = tr.querySelector('.progress-bar');
    if (progressEl) {
      setProgressBar(progressEl, progressOpts.value, progressOpts);
    }

    const statusBadge = tr.children[6].querySelector('.status-badge');
    if (statusBadge) {
      statusBadge.className = `status-badge status-badge--${job.status}`;
      statusBadge.textContent = statusLabel(job.status);
    }

    updateDownloadCell(tr.children[7], job);
  }

  function updateDownloadCell(td, job) {
    const canCancel = canCancelJob(job);
    const hasDownload = td.querySelector('.btn-download-sm');
    const hasCancel = td.querySelector('.btn-cancel-sm');
    const hasPlaceholder = td.querySelector('.download-placeholder');

    if (job.status === 'ready') {
      if (!hasDownload) fillDownloadCell(td, job);
      return;
    }
    if (canCancel) {
      if (!hasCancel) fillDownloadCell(td, job);
      return;
    }
    if (!hasPlaceholder) fillDownloadCell(td, job);
  }

  function renderRow(job) {
    const tr = document.createElement('tr');
    tr.dataset.jobId = job.id;

    const progressOpts = progressOptions(job);

    const tdId = document.createElement('td');
    tdId.className = 'col-serial';
    tdId.textContent = job.id;

    const tdName = document.createElement('td');
    tdName.className = 'col-name';
    const nameCell = document.createElement('div');
    nameCell.className = 'name-cell';
    const nameSpan = document.createElement('span');
    nameSpan.textContent = job.name;
    nameSpan.title = job.name;
    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'btn-rename';
    editBtn.title = 'Rename';
    editBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    editBtn.addEventListener('click', () => startRename(nameCell, nameSpan, editBtn, job));
    nameCell.append(nameSpan, editBtn);
    tdName.appendChild(nameCell);

    const tdType = document.createElement('td');
    const typeBadge = document.createElement('span');
    typeBadge.className = 'type-badge' + (job.type === 'batch' ? ' type-badge--batch' : '');
    typeBadge.textContent = job.type === 'batch' ? 'Batch' : 'Single';
    tdType.appendChild(typeBadge);

    const tdDate = document.createElement('td');
    tdDate.textContent = formatDate(job.created_at);

    const tdCount = document.createElement('td');
    tdCount.textContent = formatNum(job.sticker_count);

    const tdProgress = document.createElement('td');
    tdProgress.className = 'progress-cell';
    const progressWrap = document.createElement('div');
    progressWrap.className = 'progress-wrap';
    progressWrap.appendChild(buildProgressBar(progressOpts.value, progressOpts));
    tdProgress.appendChild(progressWrap);

    const tdStatus = document.createElement('td');
    const statusBadge = document.createElement('span');
    statusBadge.className = `status-badge status-badge--${job.status}`;
    statusBadge.textContent = statusLabel(job.status);
    tdStatus.appendChild(statusBadge);

    const tdDownload = document.createElement('td');
    fillDownloadCell(tdDownload, job);

    tr.append(tdId, tdName, tdType, tdDate, tdCount, tdProgress, tdStatus, tdDownload);
    return tr;
  }

  function fillDownloadCell(td, job) {
    const canCancel = canCancelJob(job);

    if (job.status === 'ready') {
      td.innerHTML = '';
      const a = document.createElement('a');
      a.href = '#';
      a.className = 'btn-download-sm';
      a.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PDF';
      a.addEventListener('click', (e) => {
        e.preventDefault();
        downloadJobPdf(job);
      });
      td.appendChild(a);
      return;
    }

    if (canCancel) {
      td.innerHTML = '';
      td.appendChild(buildCancelButton(job.id));
      return;
    }

    td.innerHTML = '<span class="download-placeholder">—</span>';
  }

  function startRename(nameCell, nameSpan, editBtn, job) {
    editingJobId = job.id;
    editBtn.hidden = true;

    const input = document.createElement('input');
    input.type = 'text';
    input.value = job.name;
    nameCell.replaceChild(input, nameSpan);
    input.focus();
    input.select();

    let finished = false;

    function finish(commit) {
      if (finished) return;
      finished = true;
      editingJobId = null;

      const newName = input.value.trim();
      if (input.parentNode === nameCell) nameCell.replaceChild(nameSpan, input);
      editBtn.hidden = false;

      if (commit && newName && newName !== job.name) {
        nameSpan.textContent = newName;
        nameSpan.title = newName;
        job.name = newName;
        renameJob(job.id, newName);
      } else {
        nameSpan.textContent = job.name;
        nameSpan.title = job.name;
      }
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') finish(true);
      if (e.key === 'Escape') finish(false);
    });
    input.addEventListener('blur', () => finish(true));
  }

  async function downloadJobPdf(job) {
    try {
      const res = await fetch(`${API_BASE}/jobs/${job.id}/download`);
      if (!res.ok) throw new Error(`Download failed (${res.status})`);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${job.name || 'sticker'}.pdf`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert(`Failed to download PDF: ${err.message}`);
    }
  }

  function buildCancelButton(jobId) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn-cancel-sm';
    btn.textContent = 'Cancel';
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      btn.disabled = true;
      cancelJob(jobId);
    });
    return btn;
  }

  async function cancelJob(jobId) {
    if (pendingCancelIds.has(jobId) || cancellingJobIds.has(jobId)) return;

    pendingCancelIds.add(jobId);
    cancellingJobIds.add(jobId);

    const idx = allJobs.findIndex((j) => j.id === jobId);
    if (idx !== -1) {
      allJobs[idx] = cancelledJobPatch(allJobs[idx]);
      window.AllokitNotifications?.ingestJobUpdate(allJobs[idx]);
      renderJobs(allJobs);
      updateCancelAllBtn();
    }

    try {
      const res = await allokitFetch(`/jobs/${jobId}/cancel`, { method: 'POST' });
      if (!res.ok) throw new Error(await res.text());
      const updated = await res.json();
      const i = allJobs.findIndex((j) => j.id === jobId);
      if (i !== -1) allJobs[i] = updated;
      if (updated.status === 'cancelled') {
        pendingCancelIds.delete(jobId);
      }
      renderJobs(allJobs);
      updateCancelAllBtn();
    } catch (err) {
      pendingCancelIds.delete(jobId);
      await loadJobs();
      alert(`Failed to cancel job: ${err.message}`);
    } finally {
      cancellingJobIds.delete(jobId);
    }
  }

  async function executeCancelAllJobs() {
    if (cancelAllInFlight) return;
    cancelAllInFlight = true;
    setCancelAllCancellingState();

    try {
      await runCancelAll();
    } finally {
      cancelAllInFlight = false;
      updateCancelAllBtn();
    }
  }

  async function runCancelAll() {
    if (window.AllokitCsvQueue?.cancelAllPending) {
      await window.AllokitCsvQueue.cancelAllPending();
    }

    const targets = allJobs.filter(canCancelJob);
    if (targets.length === 0) return;

    const targetIds = applyOptimisticCancel(targets).map((id) => Number(id));

    async function postCancelAll(ids) {
      const res = await allokitFetch('/jobs/cancel-all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ job_ids: ids }),
      });
      if (!res.ok) {
        let detail = await res.text();
        try {
          const parsed = JSON.parse(detail);
          if (parsed.detail) detail = JSON.stringify(parsed.detail);
        } catch (_) {}
        throw new Error(detail || `Cancel failed (${res.status})`);
      }
      return res.json();
    }

    const releaseTargets = (ids) => {
      ids.forEach((id) => {
        pendingCancelIds.delete(id);
        forceCancelTargets.delete(id);
      });
    };

    try {
      let remaining = targetIds.slice();
      let skipped = [];

      // Retry cancel until the backend reports no remaining targets.
      for (let attempt = 0; attempt < 6 && remaining.length > 0; attempt++) {
        if (attempt > 0) {
          await new Promise((resolve) => setTimeout(resolve, 400));
        }
        const result = await postCancelAll(remaining);
        const settled = new Set([
          ...(result.cancelled_ids || []),
          ...(result.force_cancelled_ids || []),
        ].map(Number));
        skipped = (result.skipped_ids || []).map(Number);
        // Stop retrying ids the backend cannot cancel.
        remaining = remaining.filter((id) => !settled.has(id) && !skipped.includes(id));
      }

      // Clear optimistic overrides and refresh from the server.
      releaseTargets(targetIds);
      await loadJobs();
    } catch (err) {
      releaseTargets(targetIds);
      await loadJobs();
      alert(`Failed to cancel jobs: ${err.message}`);
    }
  }

  cancelAllBtn.addEventListener('click', onCancelAllBtnClick);

  cancelAllConfirmNo.addEventListener('click', closeCancelAllConfirm);

  cancelAllConfirmYes.addEventListener('click', () => {
    closeCancelAllConfirm();
    executeCancelAllJobs();
  });

  document.addEventListener('click', (e) => {
    if (!cancelAllConfirmOpen) return;
    if (cancelAllWrap.contains(e.target)) return;
    if (cancelAllConfirmEl.contains(e.target)) return;
    closeCancelAllConfirm();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && cancelAllConfirmOpen) {
      closeCancelAllConfirm();
      cancelAllBtn.focus();
    }
  });

  window.addEventListener('resize', () => {
    if (cancelAllConfirmOpen) positionCancelAllConfirm();
  });

  document.querySelector('main')?.addEventListener('scroll', () => {
    if (cancelAllConfirmOpen) positionCancelAllConfirm();
  }, { passive: true });

  async function renameJob(jobId, newName) {
    try {
      const res = await allokitFetch(`/jobs/${jobId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName }),
      });
      if (!res.ok) throw new Error(await res.text());
      const updated = await res.json();
      const idx = allJobs.findIndex(j => j.id === jobId);
      if (idx !== -1) allJobs[idx].name = updated.name;
    } catch (err) {
      alert(`Failed to rename job: ${err.message}`);
      loadJobs();
    }
  }

  const addCsvBtn   = document.getElementById('add-csv-btn');
  const addCsvInput = document.getElementById('add-csv-input');

  addCsvBtn.addEventListener('click', () => addCsvInput.click());

  addCsvInput.addEventListener('change', async () => {
    const files = Array.from(addCsvInput.files).filter((f) => f.name.toLowerCase().endsWith('.csv'));
    addCsvInput.value = '';
    if (files.length === 0) return;

    addCsvBtn.disabled = true;
    addCsvBtn.textContent = `Saving ${files.length} file(s)…`;

    try {
      await window.AllokitCsvQueue.enqueueFiles(files);
    } catch (err) {
      console.error('Failed to save CSV files for upload:', err);
      addCsvBtn.disabled = false;
      addCsvBtn.textContent = '+ Add CSV';
      alert('Could not prepare CSV files for upload. Please try again.');
    }
  });

  window.AllokitCsvQueue.onStatusChange((status) => {
    csvQueuePending = status.pending + status.uploading;
    updateCancelAllBtn();

    if (status.active) {
      addCsvBtn.disabled = true;
      const remaining = status.pending + status.uploading;
      addCsvBtn.textContent = remaining > 0
        ? `Queuing… ${remaining} remaining`
        : 'Queuing…';
      return;
    }

    addCsvBtn.disabled = false;
    addCsvBtn.textContent = '+ Add CSV';
    loadJobs();
  });

  window.addEventListener('allokit-csv-queued', () => {
    loadJobs();
  });

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit',
      });
    } catch {
      return iso;
    }
  }

  function formatNum(n) {
    return Number(n).toLocaleString();
  }

  function statusLabel(status) {
    return {
      waiting: 'Waiting',
      generating: 'Generating',
      ready: 'Ready',
      failed: 'Failed',
      cancelled: 'Cancelled',
    }[status] || status;
  }

  loadJobs();
  revealPageChrome();
  setInterval(loadJobs, 5000);
</script>
